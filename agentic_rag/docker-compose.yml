# Docker 编排文件
# 使用 .venv 虚拟环境开发应用
# 使用 Docker 虚拟环境部署运行应用
services:

  streamlit-app:                                        # 容器名
    build:
      context: .                                        # 项目根目录
      dockerfile: apps/chatbot_ui/Dockerfile            # 构建镜像 Dockerfile 文件
    ports:
      - 8501:8501                                       # 端口映射： 主机端口:容器端口  http://localhost:8501
    env_file:
      - .env                                            # 环境变量
    restart: unless-stopped                             # 容器重启策略：除非手动停止，否则自动重启
    volumes:
      - ./apps/chatbot_ui/src:/app/apps/chatbot_ui/src  # 卷挂载：   宿主机目录:容器目录

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - 8000:8000
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./apps/api/src:/app/apps/api/src
  
  qdrant:                                               #  Qdrant 向量数据库 (本地知识库: RAG 文档 & 向量)
    image: qdrant/qdrant
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped
  
  postgres:                                             #  Postgres 数据库 (上下文管理器: Agent 运行状态 & Checkpoint 聊天历史)
    image: postgres:16-alpine
    ports:
      - 5433:5432
    environment: 
      POSTGRES_DB: langgraph_db
      POSTGRES_USER: langgraph_user
      POSTGRES_PASSWORD: langgraph_password
      PGDATA: /var/lib/postgresql/data/pgdata
    restart: unless-stopped
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

