# Docker 编排文件
# 使用 .venv 虚拟环境开发应用
# 使用 Docker 虚拟环境部署运行应用
services:

  # streamlit-app:              # 容器名
  #   build:
  #     context: .              # 项目根目录
  #     dockerfile: Dockerfile  # 构建镜像 Dockerfile 文件
  #   ports:
  #     - 8501:8501             # 端口映射： 主机端口:容器端口  http://localhost:8501
  #   env_file:
  #     - .env                  # 环境变量
  #   restart: unless-stopped   # 容器重启策略：除非手动停止，否则自动重启
  #   volumes:
  #     - ./src:/app/src        # 卷挂载：   宿主机目录:容器目录

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - 8000:8000
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./apps/api/src:/app/apps/api/src
